name: CI
on: [push, pull_request]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # was on same line as "with:" — invalid YAML

      - name: Install dependencies
        run: |
          pip install flake8 pytest httpx
          pip install -r ml/requirements.txt

      - name: Lint
        run: flake8 services/ ml/ pipelines/ --max-line-length=100

      - name: Run API tests
        run: |
          cd services/api
          pip install -r requirements.txt
          pytest tests/ -v

  build-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build feature-extract image
        run: |
          docker build -t openbioops/feature-extract:ci \
            pipelines/containers/feature-extract

  smoke-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/

      - name: Run smoke pipeline
        run: nextflow run pipelines/main.nf -profile test