version: "3.9"

services:
  api:
    build: ./services/api
    ports:
      - "8000:8000"
    volumes:
      - ./artifacts:/app/artifacts
      - ./services/api/app/data:/app/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - ARTIFACTS_DIR=/app/artifacts/ml
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build: ./services/dashboard
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    depends_on:
      - api

redis:
  image: redis:7-alpine
  ports:
    - "6379:6379"
celery-worker:
  build: ./services/api
  command: celery -A app.tasks worker --loglevel=info
  environment:
    - CELERY_BROKER_URL=redis://redis:6379/0
    - ARTIFACTS_DIR=/app/artifacts/ml
    - FEATURES_DIR=/app/artifacts/features
  volumes:
    - ./artifacts:/app/artifacts
  depends_on:
    - redis